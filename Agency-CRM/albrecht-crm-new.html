<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albrecht Digital CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d1a;--bg2:#10132a;--bg3:#161938;--bg4:#1e2245;
  --border:#2a2d55;--border2:#3a3d65;
  --text:#f0f2f5;--text2:#9094b8;--text3:#5a5e88;
  --accent:#7c3aed;--accent2:#6d28d9;--accent-glow:rgba(124,58,237,.18);
  --accent-gradient:linear-gradient(135deg,#7c3aed,#ec4899,#f97316);
  --accent-gradient-h:linear-gradient(90deg,#7c3aed,#ec4899,#f97316);
  --green:#10b981;--green-bg:rgba(16,185,129,.1);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,.1);
  --pink:#ec4899;--orange:#f97316;
  --chat-own:#2d1a5e;--chat-bubble:#1c1f42;
  --sidebar:260px;--topbar:58px;
  --r:10px;--r2:6px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --t:.18s ease;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
input,select,textarea{font-family:inherit;font-size:14px}
table{width:100%;border-collapse:collapse}
button{cursor:pointer;font-family:inherit}

/* ===== AUTH ===== */
#authWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 20% 50%,rgba(124,58,237,.12) 0,transparent 55%),
             radial-gradient(ellipse at 80% 20%,rgba(236,72,153,.08) 0,transparent 55%),
             radial-gradient(ellipse at 50% 80%,rgba(249,115,22,.06) 0,transparent 55%),var(--bg)}
.auth-box{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:44px 36px;width:100%;max-width:400px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-gradient-h)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-mark{width:52px;height:52px;border-radius:12px;background:var(--accent-gradient);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin-bottom:12px;box-shadow:0 0 30px rgba(124,58,237,.35)}
.auth-logo h1{font-size:20px;font-weight:800;background:var(--accent-gradient-h);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.3px}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:3px}
.auth-tabs{display:flex;background:var(--bg2);border-radius:8px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);border:none;background:none;border-radius:6px;transition:var(--t)}
.auth-tab.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:14px;outline:none;transition:border-color var(--t)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3);color:var(--text)}
.check-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:16px}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;border:none;transition:var(--t)}
.btn-primary{background:var(--accent-gradient);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:var(--red)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.btn-success:hover{background:var(--green);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.auth-error{background:var(--red-bg);border:1px solid rgba(239,68,68,.2);border-radius:var(--r2);padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.pending-screen{text-align:center;padding:32px 20px}
.pending-icon{font-size:40px;margin-bottom:12px}
.pending-screen h2{font-size:18px;margin-bottom:8px}
.pending-screen p{font-size:13px;color:var(--text2);line-height:1.6}

/* ===== LAYOUT ===== */
#appWrap{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:18px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-brand{display:flex;align-items:center;gap:10px}
.sidebar-logo{width:34px;height:34px;border-radius:8px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.sidebar-brand-text{font-size:14px;font-weight:700;background:var(--accent-gradient-h);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-brand-sub{font-size:11px;color:var(--text2)}
.sidebar-nav{flex:1;padding:10px 10px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:10px 8px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r2);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:var(--t);position:relative;user-select:none}
.nav-item:hover{background:rgba(124,58,237,.08);color:var(--text)}
.nav-item.active{background:rgba(124,58,237,.15);color:var(--purple)}
.nav-item .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px;margin-left:auto;min-width:18px;text-align:center}
.nav-badge-blue{background:var(--accent)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);cursor:default}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-info-text{flex:1;min-width:0}
.user-info-text .uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-info-text .urole{font-size:11px;color:var(--text2)}
.logout-btn{background:none;border:none;color:var(--text3);font-size:16px;padding:4px;border-radius:4px;transition:var(--t)}
.logout-btn:hover{color:var(--red)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}

/* ===== CARDS ===== */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:700}
.card-body{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-gradient-h)}
.stat-icon{font-size:22px;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:12px;color:var(--text2);margin-top:3px}

/* ===== TABLE ===== */
th,td{padding:11px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}

/* ===== BADGE ===== */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-blue{background:var(--accent-glow);color:var(--accent)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:rgba(100,116,139,.1);color:#94a3b8}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .2s ease}
.modal-lg{max-width:760px}
.modal-xl{max-width:980px;max-height:92vh}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg3);z-index:1}
.modal-header h3{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text2);font-size:18px;padding:3px;border-radius:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px;position:sticky;bottom:0;background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-sep{border:none;border-top:1px solid var(--border);margin:16px 0}
.form-section-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}

/* ===== CHAT ===== */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--topbar));margin:-24px;background:var(--bg)}
.chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:4px}
.chat-date-divider{text-align:center;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;padding:12px 0 6px}
.chat-msg{display:flex;gap:9px;max-width:72%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.own{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.msg-content{flex:1}
.msg-name{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px}
.chat-msg.own .msg-name{text-align:right}
.msg-bubble{background:var(--bg3);padding:9px 13px;border-radius:12px 12px 12px 3px;font-size:14px;line-height:1.5;color:var(--text);word-wrap:break-word}
.chat-msg.own .msg-bubble{background:#1a3a60;border-radius:12px 12px 3px 12px}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px}
.chat-msg.own .msg-time{text-align:right}
.mention-highlight{background:rgba(124,58,237,.2);color:#c4b5fd;border-radius:3px;padding:0 2px;font-weight:600}
.chat-input-area{padding:12px 20px 18px;border-top:1px solid var(--border);background:var(--bg2);position:relative}
.mention-dropdown{position:absolute;bottom:calc(100% + 4px);left:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--shadow);z-index:50;min-width:160px;max-height:160px;overflow-y:auto}
.mention-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:var(--t)}
.mention-item:hover,.mention-item.active{background:rgba(124,58,237,.15);color:var(--purple)}
.mention-item-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.chat-input-row{display:flex;gap:9px;align-items:flex-end}
.chat-input-row input{flex:1;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:22px;color:var(--text);font-size:14px;outline:none;transition:border-color var(--t)}
.chat-input-row input:focus{border-color:var(--accent)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--accent-gradient);border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--t)}
.chat-send:hover{opacity:.9}
.online-bar{padding:8px 24px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text3);display:flex;align-items:center;gap:7px}
.online-dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block}

/* ===== CALENDAR ===== */
.cal-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-toolbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border)}
.cal-title{font-size:15px;font-weight:700;flex:1}
.cal-view-tabs{display:flex;background:var(--bg2);border-radius:var(--r2);padding:2px}
.cal-view-tab{padding:6px 13px;font-size:12px;font-weight:600;color:var(--text2);border:none;background:none;border-radius:4px;cursor:pointer;transition:var(--t)}
.cal-view-tab.active{background:var(--bg4);color:var(--text)}
.cal-nav-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:var(--r2);font-size:13px;transition:var(--t)}
.cal-nav-btn:hover{border-color:var(--border2);color:var(--text)}
/* Month grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-header{padding:8px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.cal-cell{min-height:90px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--t);position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg4)}
.cal-cell.other-month .cal-date{color:var(--text3);opacity:.5}
.cal-cell.today .cal-date{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-date{font-size:12px;font-weight:600;margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-event{font-size:11px;background:var(--accent-glow);color:var(--accent);border-radius:3px;padding:1px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event.ev-green{background:var(--green-bg);color:var(--green)}
.cal-event.ev-yellow{background:var(--yellow-bg);color:var(--yellow)}
.cal-event.ev-red{background:var(--red-bg);color:var(--red)}
.cal-event.ev-purple{background:var(--purple-bg);color:var(--purple)}
/* Week view */
.week-grid{display:grid;grid-template-columns:56px repeat(7,1fr);border-top:1px solid var(--border)}
.week-header-row{display:grid;grid-template-columns:56px repeat(7,1fr)}
.week-time-col{border-right:1px solid var(--border);padding:6px 8px;font-size:11px;color:var(--text3);text-align:right}
.week-day-header{padding:8px;text-align:center;font-size:12px;font-weight:600;border-left:1px solid var(--border);border-bottom:1px solid var(--border)}
.week-day-header .wd-name{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.week-day-header .wd-date{font-size:18px;font-weight:800}
.week-day-header.wd-today .wd-date{color:var(--accent)}
.week-cell{border-left:1px solid var(--border);border-bottom:1px solid var(--border);min-height:50px;cursor:pointer;transition:background var(--t);position:relative}
.week-cell:hover{background:var(--bg4)}
/* Day view */
.day-view-wrap{display:grid;grid-template-columns:56px 1fr}
.day-slot{border-bottom:1px solid var(--border);min-height:50px;cursor:pointer;transition:background var(--t);position:relative;padding:4px 8px}
.day-slot:hover{background:var(--bg4)}
.day-time{border-right:1px solid var(--border);padding:4px 8px;font-size:11px;color:var(--text3);text-align:right;min-height:50px;display:flex;align-items:flex-start;padding-top:6px}
/* Cal event pill inside week/day */
.cal-event-pill{position:absolute;left:2px;right:2px;background:var(--accent-glow);color:var(--accent);border-radius:4px;padding:2px 5px;font-size:11px;overflow:hidden;z-index:2;cursor:pointer}

/* ===== QUESTIONNAIRE MODAL ===== */
.q-step-indicator{display:flex;gap:6px;margin-bottom:20px}
.q-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:var(--t)}
.q-dot.done{background:var(--green)}
.q-dot.active{background:var(--accent);width:20px;border-radius:4px}
.q-label{font-size:14px;font-weight:600;margin-bottom:8px}
.q-input{width:100%;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:14px;outline:none;transition:border-color var(--t)}
.q-input:focus{border-color:var(--accent)}
.q-select{appearance:none}
.q-textarea{resize:vertical;min-height:120px;line-height:1.6}
.q-radio-group{display:flex;flex-direction:column;gap:8px}
.q-radio-opt{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:var(--t)}
.q-radio-opt:hover{border-color:var(--border2)}
.q-radio-opt.selected{border-color:var(--accent);background:var(--accent-glow)}
.q-radio-opt input{accent-color:var(--accent)}

/* ===== AGREEMENT ===== */
.agreement-wrap{background:#f0f2f5;border-radius:var(--r);overflow:hidden}
.agreement-toolbar{background:var(--bg3);padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.agreement-frame{width:100%;height:600px;border:none;border-radius:0}

/* ===== MISC ===== */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .es-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.page-actions{display:flex;gap:9px;align-items:center}
.divider{height:1px;background:var(--border);margin:16px 0}
.info-banner{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:var(--r2);padding:10px 14px;font-size:13px;color:var(--purple);margin-bottom:16px}
.stripe-banner{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(249,115,22,.08));border:1px solid rgba(124,58,237,.25);border-radius:var(--r2);padding:12px 14px;font-size:13px;color:#c4b5fd;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab-btn{padding:9px 16px;font-size:13px;font-weight:600;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;transition:var(--t)}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple)}
.tab-btn:hover:not(.active){color:var(--text)}
</style>
</head>
<body>

<!-- ===== AUTH ===== -->
<div id="authWrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-mark">A</div>
      <h1>Albrecht Digital CRM</h1>
      <p>Your agency. Organized.</p>
    </div>
    <div id="authError" class="auth-error"></div>
    <div id="authContent"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="appWrap">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="sidebar-logo">A</div>
          <div>
            <div class="sidebar-brand-text">Albrecht Digital</div>
            <div class="sidebar-brand-sub">CRM Platform</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
        <div class="nav-item" id="nav-clients" onclick="navigate('clients')"><span class="nav-icon">👥</span> Clients</div>
        <div class="nav-item" id="nav-calendar" onclick="navigate('calendar')"><span class="nav-icon">📅</span> Team Calendar</div>
        <div class="nav-item" id="nav-agreements" onclick="navigate('agreements')"><span class="nav-icon">📄</span> Agreements</div>
        <div class="nav-item" id="nav-chat" onclick="navigate('chat')">
          <span class="nav-icon">💬</span> Team Chat
          <span class="nav-badge" id="chatBadge" style="display:none">0</span>
        </div>
        <div class="nav-section-label admin-only" style="display:none">Admin</div>
        <div class="nav-item admin-only" id="nav-team" style="display:none" onclick="navigate('team')"><span class="nav-icon">🛡️</span> Team Management
          <span class="nav-badge nav-badge-blue" id="pendingBadge" style="display:none">0</span>
        </div>
        <div class="nav-item admin-only" id="nav-overview" style="display:none" onclick="navigate('overview')"><span class="nav-icon">🔭</span> Team Overview</div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" id="sbAvatar">?</div>
          <div class="user-info-text">
            <div class="uname" id="sbName">User</div>
            <div class="urole" id="sbRole">Employee</div>
          </div>
          <button class="logout-btn" onclick="handleLogout()" title="Sign out">⏻</button>
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="pageTitle">Dashboard</div>
        <div class="page-actions" id="pageActions"></div>
      </div>
      <div class="content" id="contentArea"></div>
    </div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════════════════════════════════
//  FIREBASE CONFIG
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyC1OP7Iq0hgSwfVxLkVNgBoXY5UytTmx2g",
  authDomain: "albrecht-agency-crm.firebaseapp.com",
  projectId: "albrecht-agency-crm",
  storageBucket: "albrecht-agency-crm.firebasestorage.app",
  messagingSenderId: "924889697457",
  appId: "1:924889697457:web:b304fff585bfaa25c46690"
};

// ═══════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════
let auth, db;
let currentUser = null, currentUserData = null;
let currentPage = 'dashboard';
let chatUnread = 0;
let lastChatSeenTS = 0;
let chatListener = null;
let teamMembers = [];
let calView = 'month'; // month | week | day
let calDate = new Date(); // reference date for current view
let calEventListenerUnsub = null;
let calEvents = [];

const PLAN_PRICES = {'Month-to-Month':349,'12-Month':299,'24-Month':199,'36-Month':149};
const AVATAR_COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4','#f97316','#6366f1','#84cc16'];

function avatarColor(name){let h=0;for(let c of(name||''))h=c.charCodeAt(0)+((h<<5)-h);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtTime(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
function nowSecs(){return Date.now()/1000}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
try{
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
}catch(e){console.error('Firebase init error',e)}

auth.onAuthStateChanged(async user => {
  if(!user){showAuth();return}
  currentUser = user;
  try{
    const snap = await db.collection('users').doc(user.uid).get();
    if(!snap.exists){showAuth();return}
    currentUserData = {id:user.uid,...snap.data()};
    if(currentUserData.status === 'pending'){showPending();return}
    if(currentUserData.status === 'denied'){showDenied();return}
    showApp();
  }catch(e){console.error(e);showAuth()}
});

// ═══════════════════════════════════════════════
//  AUTH UI
// ═══════════════════════════════════════════════
function showAuth(tab='login'){
  document.getElementById('authWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
  renderAuthForm(tab);
}

function renderAuthForm(tab){
  const c = document.getElementById('authContent');
  document.getElementById('authError').style.display='none';
  if(tab==='login'){
    c.innerHTML=`
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="renderAuthForm('login')">Sign In</button>
        <button class="auth-tab" onclick="renderAuthForm('signup')">Sign Up</button>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="aEmail" placeholder="you@albrecht.digital"></div>
      <div class="form-group"><label>Password</label><input type="password" id="aPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="check-row"><input type="checkbox" id="aRemember" checked><label for="aRemember">Remember me on this device</label></div>
      <button class="btn btn-primary btn-full" style="padding:13px;font-size:15px;font-weight:700;border-radius:8px;margin-top:4px" onclick="doLogin()">Log In →</button>`;
  }else{
    c.innerHTML=`
      <div class="auth-tabs">
        <button class="auth-tab" onclick="renderAuthForm('login')">Sign In</button>
        <button class="auth-tab active" onclick="renderAuthForm('signup')">Sign Up</button>
      </div>
      <div class="form-group"><label>Full Name</label><input type="text" id="aName" placeholder="Jane Smith"></div>
      <div class="form-group"><label>Email</label><input type="email" id="aEmail" placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="aPw" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <button class="btn btn-primary btn-full" style="padding:13px;font-size:15px;font-weight:700;border-radius:8px;margin-top:4px" onclick="doSignup()">Request Access →</button>`;
  }
}

async function doLogin(){
  const email=document.getElementById('aEmail').value.trim();
  const pw=document.getElementById('aPw').value;
  const rem=document.getElementById('aRemember').checked;
  if(!email||!pw){showAuthError('Please fill in all fields.');return}
  try{
    const p = rem ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
    await auth.setPersistence(p);
    await auth.signInWithEmailAndPassword(email,pw);
  }catch(e){showAuthError(e.message)}
}

async function doSignup(){
  const name=document.getElementById('aName').value.trim();
  const email=document.getElementById('aEmail').value.trim();
  const pw=document.getElementById('aPw').value;
  if(!name||!email||!pw){showAuthError('Please fill in all fields.');return}
  if(pw.length<6){showAuthError('Password must be at least 6 characters.');return}
  try{
    const {user} = await auth.createUserWithEmailAndPassword(email,pw);
    const usersSnap = await db.collection('users').get();
    const isFirst = usersSnap.empty;
    const color = avatarColor(name);
    await db.collection('users').doc(user.uid).set({
      name, email,
      role: isFirst ? 'owner' : 'employee',
      status: isFirst ? 'approved' : 'pending',
      avatarColor: color,
      lastChatSeen: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if(!isFirst) showPending();
  }catch(e){showAuthError(e.message)}
}

function showAuthError(msg){
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display='block';
}

function showPending(){
  document.getElementById('authWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
  document.getElementById('authContent').innerHTML=`
    <div class="pending-screen">
      <div class="pending-icon">⏳</div>
      <h2>Awaiting Approval</h2>
      <p>Your account has been submitted. Tyler will review and approve your access shortly.</p>
      <br>
      <button class="btn btn-secondary" onclick="auth.signOut()">Sign Out</button>
    </div>`;
}

function showDenied(){
  document.getElementById('authWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
  document.getElementById('authContent').innerHTML=`
    <div class="pending-screen">
      <div class="pending-icon">🚫</div>
      <h2>Access Denied</h2>
      <p>Your account access was not approved. Contact Tyler for assistance.</p>
      <br>
      <button class="btn btn-secondary" onclick="auth.signOut()">Sign Out</button>
    </div>`;
}

async function handleLogout(){
  if(chatListener){chatListener();chatListener=null}
  if(calEventListenerUnsub){calEventListenerUnsub();calEventListenerUnsub=null}
  await auth.signOut();
}

// ═══════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════
async function showApp(){
  document.getElementById('authWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  // Sidebar
  const isAdmin = ['owner','admin'].includes(currentUserData.role);
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display=isAdmin?'':'none');
  // Avatar
  const av = document.getElementById('sbAvatar');
  av.textContent = initials(currentUserData.name);
  av.style.background = currentUserData.avatarColor || avatarColor(currentUserData.name);
  document.getElementById('sbName').textContent = currentUserData.name;
  document.getElementById('sbRole').textContent = currentUserData.role.charAt(0).toUpperCase()+currentUserData.role.slice(1);
  // Restore lastChatSeen from Firestore
  lastChatSeenTS = currentUserData.lastChatSeen || 0;
  // Load team members for mentions
  loadTeamMembers();
  // Chat badge listener
  initChatBadge();
  // Pending badge for admin
  if(isAdmin) initPendingBadge();
  // Navigate
  navigate('dashboard');
}

async function loadTeamMembers(){
  try{
    const snap = await db.collection('users').where('status','==','approved').get();
    teamMembers = snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}
}

function initPendingBadge(){
  db.collection('users').where('status','==','pending')
    .onSnapshot(snap=>{
      const c = snap.size;
      const b = document.getElementById('pendingBadge');
      if(c>0){b.textContent=c;b.style.display='inline-flex'}else{b.style.display='none'}
    });
}

function initChatBadge(){
  if(chatListener) chatListener();
  chatListener = db.collection('messages').orderBy('timestamp','asc')
    .onSnapshot(snap=>{
      if(currentPage==='chat'){
        // Clear badge if on chat page
        chatUnread=0;
        const b=document.getElementById('chatBadge');
        b.style.display='none';
        return;
      }
      let count=0;
      snap.docs.forEach(d=>{
        const msg=d.data();
        const ts=msg.timestamp?.seconds||0;
        if(msg.userId!==currentUser.uid && ts>lastChatSeenTS) count++;
      });
      chatUnread=count;
      const b=document.getElementById('chatBadge');
      if(count>0){b.textContent=count;b.style.display='inline-flex'}
      else{b.style.display='none'}
    });
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  const titles = {dashboard:'Dashboard',clients:'Clients',calendar:'Team Calendar',agreements:'Agreements',chat:'Team Chat',team:'Team Management',overview:'Team Overview'};
  document.getElementById('pageTitle').textContent = titles[page]||page;
  document.getElementById('pageActions').innerHTML='';
  document.getElementById('contentArea').style.padding = page==='chat'?'0':'24px';
  if(page==='chat'){
    // Mark as seen — update Firestore
    updateLastChatSeen();
  }
  const renders = {dashboard:renderDashboard,clients:renderClients,calendar:renderCalendar,agreements:renderAgreements,chat:renderChat,team:renderTeam,overview:renderOverview};
  if(renders[page]) renders[page]();
}

async function updateLastChatSeen(){
  const now = nowSecs();
  lastChatSeenTS = now;
  chatUnread=0;
  document.getElementById('chatBadge').style.display='none';
  try{
    await db.collection('users').doc(currentUser.uid).update({lastChatSeen:now});
  }catch(e){}
}

// ═══════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════
async function renderDashboard(){
  const ca = document.getElementById('contentArea');
  ca.innerHTML='<div style="color:var(--text2);font-size:13px">Loading…</div>';
  try{
    const isAdmin=['owner','admin'].includes(currentUserData.role);
    let cQuery = db.collection('clients');
    if(!isAdmin) cQuery = cQuery.where('employeeId','==',currentUser.uid);
    const [cSnap,iSnap] = await Promise.all([
      cQuery.get(),
      (isAdmin?db.collection('invoices'):db.collection('invoices').where('employeeId','==',currentUser.uid)).get()
    ]);
    const clients = cSnap.docs.map(d=>d.data());
    const invoices = iSnap.docs.map(d=>d.data());
    const active = clients.filter(c=>c.status==='Active').length;
    const mrr = clients.filter(c=>c.status==='Active').reduce((s,c)=>s+(c.monthlyRate||0),0);
    const paid = invoices.filter(i=>i.status==='Paid').reduce((s,i)=>s+(i.amount||0),0);
    ca.innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${clients.length}</div><div class="stat-label">Total Clients</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${active}</div><div class="stat-label">Active Clients</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">$${mrr.toLocaleString()}</div><div class="stat-label">Monthly Recurring</div></div>
        <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value">$${paid.toLocaleString()}</div><div class="stat-label">Total Collected</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Recent Clients</h3></div>
        <div class="card-body" style="padding:0">
          ${clients.length===0?'<div class="empty-state"><div class="es-icon">👥</div><p>No clients yet. Add your first one!</p></div>':
          '<table><thead><tr><th>Name</th><th>Business</th><th>Plan</th><th>Status</th><th>MRR</th></tr></thead><tbody>'+
          clients.slice(-5).reverse().map(c=>`<tr>
            <td style="font-weight:600">${esc(c.name)}</td>
            <td style="color:var(--text2)">${esc(c.businessName||'—')}</td>
            <td><span class="badge badge-blue">${esc(c.plan||'—')}</span></td>
            <td><span class="badge ${c.status==='Active'?'badge-green':c.status==='Lead'?'badge-blue':'badge-gray'}">${c.status}</span></td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:12px">$${(c.monthlyRate||0).toLocaleString()}/mo</td>
          </tr>`).join('')+'</tbody></table>'}
        </div>
      </div>`;
  }catch(e){ca.innerHTML=`<div style="color:var(--red)">Error loading dashboard: ${e.message}</div>`}
}

// ═══════════════════════════════════════════════
//  CLIENTS
// ═══════════════════════════════════════════════
async function renderClients(){
  const ca = document.getElementById('contentArea');
  const isAdmin=['owner','admin'].includes(currentUserData.role);
  document.getElementById('pageActions').innerHTML=`<button class="btn btn-primary" onclick="openAddClient()">+ Add Client</button>`;
  ca.innerHTML='<div style="color:var(--text2);font-size:13px">Loading…</div>';
  try{
    let q = db.collection('clients').orderBy('createdAt','desc');
    if(!isAdmin) q=q.where('employeeId','==',currentUser.uid);
    const snap = await q.get();
    const clients = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(clients.length===0){
      ca.innerHTML='<div class="card"><div class="card-body"><div class="empty-state"><div class="es-icon">👥</div><p>No clients yet. Click "+ Add Client" to get started!</p></div></div></div>';
      return;
    }
    ca.innerHTML=`<div class="card"><div class="card-body" style="padding:0">
      <table>
        <thead><tr><th>Client Name</th><th>Business</th><th>Industry</th><th>Plan</th><th>Monthly Rate</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${clients.map(c=>`<tr>
          <td>
            <div style="font-weight:600">${esc(c.name)}</div>
            <div style="font-size:11px;color:var(--text2)">${esc(c.email||'')}</div>
          </td>
          <td style="color:var(--text2)">${esc(c.businessName||'—')}</td>
          <td style="color:var(--text2);font-size:12px">${esc(c.industry||'—')}</td>
          <td><span class="badge badge-blue">${esc(c.plan||'—')}</span></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600">$${(c.monthlyRate||0).toLocaleString()}/mo</td>
          <td><span class="badge ${c.status==='Active'?'badge-green':c.status==='Lead'?'badge-blue':c.status==='Churned'?'badge-red':'badge-gray'}">${c.status}</span></td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="openEditClient('${c.id}')">Edit</button>
              ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')">Del</button>`:''}
            </div>
          </td>
        </tr>`).join('')}</tbody>
      </table>
    </div></div>`;
  }catch(e){ca.innerHTML=`<div style="color:var(--red)">Error: ${e.message}</div>`}
}

function openAddClient(){
  openModal('Add New Client', buildClientForm(), [
    {label:'Cancel',cls:'btn-secondary',fn:'closeModal()'},
    {label:'Save Client',cls:'btn-primary',fn:'saveClient()'}
  ]);
  setupPlanListener();
}

async function openEditClient(id){
  const snap = await db.collection('clients').doc(id).get();
  const c = {id,...snap.data()};
  openModal('Edit Client', buildClientForm(c), [
    {label:'Cancel',cls:'btn-secondary',fn:'closeModal()'},
    {label:'Save Changes',cls:'btn-primary',fn:`saveClient('${id}')`}
  ]);
  setupPlanListener();
}

function buildClientForm(c={}){
  const planOpts = ['Month-to-Month','12-Month','24-Month','36-Month'];
  const statusOpts = ['Active','Inactive','Lead','Churned'];
  return `
    <div class="form-section-label">📋 Client Info</div>
    <div class="form-row">
      <div class="form-group"><label>Contact Name *</label><input type="text" id="cf_name" value="${esc(c.name||'')}" placeholder="Jane Smith"></div>
      <div class="form-group"><label>Email</label><input type="email" id="cf_email" value="${esc(c.email||'')}" placeholder="jane@example.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Business Name</label><input type="text" id="cf_biz" value="${esc(c.businessName||'')}" placeholder="ABC Roofing LLC"></div>
      <div class="form-group"><label>Industry</label><input type="text" id="cf_industry" value="${esc(c.industry||'')}" placeholder="Roofing, HVAC, etc."></div>
    </div>
    <div class="form-group"><label>Address</label><input type="text" id="cf_address" value="${esc(c.address||'')}" placeholder="123 Main St, Tampa FL"></div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input type="tel" id="cf_phone" value="${esc(c.phone||'')}" placeholder="(555) 000-0000"></div>
      <div class="form-group"><label>Status</label>
        <select id="cf_status">${statusOpts.map(o=>`<option value="${o}"${c.status===o?' selected':''}>${o}</option>`).join('')}</select>
      </div>
    </div>
    <hr class="form-sep">
    <div class="form-section-label">💳 Plan & Billing</div>
    <div class="form-row">
      <div class="form-group"><label>Plan</label>
        <select id="cf_plan" onchange="updateRateFromPlan()">${planOpts.map(o=>`<option value="${o}"${c.plan===o?' selected':''}>${o} — $${PLAN_PRICES[o]}/mo</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Monthly Rate</label>
        <input type="number" id="cf_rate" value="${c.monthlyRate||PLAN_PRICES['Month-to-Month']}" placeholder="349">
      </div>
    </div>
    <div class="form-group"><label>Start Date</label><input type="date" id="cf_start" value="${c.startDate||''}"></div>
    <hr class="form-sep">
    <div class="form-section-label">🔐 Payment on File</div>
    <div class="stripe-banner">💳 <span>Payment is processed via <strong>Stripe</strong>. Enter the Stripe Customer ID after setting up payment in your Stripe dashboard.</span></div>
    <div class="form-row">
      <div class="form-group"><label>Stripe Customer ID</label><input type="text" id="cf_stripeId" value="${esc(c.stripeCustomerId||'')}" placeholder="cus_..."></div>
      <div class="form-group"><label>Card Last 4</label><input type="text" id="cf_card4" value="${esc(c.cardLast4||'')}" placeholder="4242" maxlength="4"></div>
    </div>
    <div class="form-row">

// Fix: only highlight @Word (no adjacent words)
function renderMentions(text){
  if(!text) return '';
  const safe = esc(text);
  // Match @Word where Word is one token (no spaces). Use word boundary after.
  return safe.replace(/@([A-Za-z][A-Za-z0-9]*)/g, (_,name)=>{
    return `<span class="mention-highlight">@${name}</span>`;
  });
}

let mentionQuery = null;
let mentionStart = -1;

function chatInputChange(input){
  const val = input.value;
  const pos = input.selectionStart;
  // Find @ before cursor
  let atIdx = -1;
  for(let i=pos-1;i>=0;i--){
    if(val[i]==='@'){atIdx=i;break}
    if(val[i]===' '){break}
  }
  if(atIdx>=0){
    const query = val.slice(atIdx+1,pos);
    mentionQuery = query;
    mentionStart = atIdx;
    showMentionDropdown(query);
  }else{
    hideMentionDropdown();
  }
}

function showMentionDropdown(query){
  const dd = document.getElementById('mentionDropdown');
  const filtered = teamMembers.filter(m=>m.name.toLowerCase().startsWith(query.toLowerCase()));
  if(filtered.length===0){hideMentionDropdown();return}
  dd.innerHTML = filtered.map((m,i)=>`
    <div class="mention-item${i===0?' active':''}" onclick="insertMention('${esc(m.name.split(' ')[0])}')">
      <div class="mention-item-avatar" style="background:${m.avatarColor||avatarColor(m.name)}">${initials(m.name)}</div>
      ${esc(m.name)}
    </div>`).join('');
  dd.style.display='block';
}

function hideMentionDropdown(){
  document.getElementById('mentionDropdown').style.display='none';
  mentionQuery=null;mentionStart=-1;
}

function insertMention(firstName){
  const input = document.getElementById('chatInput');
  const val = input.value;
  const newVal = val.slice(0,mentionStart)+'@'+firstName+' '+val.slice(input.selectionStart);
  input.value=newVal;
  const newPos = mentionStart+firstName.length+2;
  input.setSelectionRange(newPos,newPos);
  hideMentionDropdown();
  input.focus();
}

function chatKeyDown(e){
  const dd = document.getElementById('mentionDropdown');
  if(dd.style.display!=='none'){
    if(e.key==='Tab'){
      e.preventDefault();
      const active = dd.querySelector('.mention-item.active');
      if(active){
        const name = active.textContent.trim().split(' ')[0];
        insertMention(name);
      }
      return;
    }
    if(e.key==='Escape'){hideMentionDropdown();return}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}

async function sendMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  hideMentionDropdown();
  try{
    await db.collection('messages').add({
      text, userId:currentUser.uid,
      userName:currentUserData.name,
      userRole:currentUserData.role,
      avatarColor:currentUserData.avatarColor||avatarColor(currentUserData.name),
      timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(e){input.value=text;alert('Error sending: '+e.message)}
}

function loadCalEvents(){

    .onSnapshot(snap=>{
      calEvents = snap.docs.map(d=>({id:d.id,...d.data()}));

}

function drawCalendar(){
  const container = document.getElementById('calContainer');
  if(!container) return;
  if(calView==='month') drawMonthView(container);
  else if(calView==='week') drawWeekView(container);
  else drawDayView(container);
}

function calToolbar(){
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let title='';
  if(calView==='month') title=`${months[calDate.getMonth()]} ${calDate.getFullYear()}`;
  else if(calView==='week'){
    const w = getWeekDates(calDate);
    title=`Week of ${months[w[0].getMonth()]} ${w[0].getDate()}, ${w[0].getFullYear()}`;
  }else{
    title=`${months[calDate.getMonth()]} ${calDate.getDate()}, ${calDate.getFullYear()}`;
  }
  return `
    <div class="cal-toolbar">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <button class="cal-nav-btn" onclick="calGoToday()">Today</button>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      <div class="cal-title">${title}</div>
      <div class="cal-view-tabs">
        <button class="cal-view-tab${calView==='day'?' active':''}" onclick="calSetView('day')">Day</button>
        <button class="cal-view-tab${calView==='week'?' active':''}" onclick="calSetView('week')">Week</button>
        <button class="cal-view-tab${calView==='month'?' active':''}" onclick="calSetView('month')">Month</button>
      </div>
    </div>`;
}

function calNav(dir){
  if(calView==='month') calDate = new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);
  else if(calView==='week') calDate = new Date(calDate.getTime()+dir*7*24*3600*1000);
  else calDate = new Date(calDate.getTime()+dir*24*3600*1000);
  drawCalendar();
}

function calGoToday(){calDate=new Date();drawCalendar()}
function calSetView(v){calView=v;drawCalendar()}

function getWeekDates(ref){
  const d = new Date(ref);
  const day = d.getDay(); // 0=Sun
  const dates=[];
  for(let i=0;i<7;i++){
    const nd=new Date(d);nd.setDate(d.getDate()-day+i);dates.push(nd);
  }
  return dates;
}

function drawMonthView(container){
  const today = new Date();
  const year = calDate.getFullYear(), month = calDate.getMonth();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = `<div class="cal-wrap">${calToolbar()}<div class="cal-grid">`;
  days.forEach(d=>html+=`<div class="cal-day-header">${d}</div>`);
  // Fill leading blanks
  for(let i=0;i<firstDay;i++){
    const prevDate = new Date(year,month,-(firstDay-i-1));
    html+=`<div class="cal-cell other-month" ondblclick="openCalQuestionnaire('${fmtDateISO(prevDate)}')">
      <div class="cal-date">${prevDate.getDate()}</div></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const dateStr = fmtDateISO(new Date(year,month,d));
    const dayEvents = getEventsForDate(dateStr);
    html+=`<div class="cal-cell${isToday?' today':''}" ondblclick="openCalQuestionnaire('${dateStr}')">
      <div class="cal-date">${d}</div>
      ${dayEvents.slice(0,3).map(ev=>`<div class="cal-event ${ev.colorClass||''}" title="${esc(ev.title)}" onclick="event.stopPropagation();viewCalEvent('${ev.id}')">${esc(ev.title)}</div>`).join('')}
      ${dayEvents.length>3?`<div style="font-size:10px;color:var(--text3)">+${dayEvents.length-3} more</div>`:''}
    </div>`;
  }
  html+='</div></div>';
  container.innerHTML=html;
}

function drawWeekView(container){
  const weekDates = getWeekDates(calDate);
  const today = new Date();
  const hours=[];
  for(let h=7;h<=21;h++) hours.push(h);
  let html=`<div class="cal-wrap">${calToolbar()}<div style="overflow-x:auto">
    <div class="week-header-row">
      <div class="week-time-col"></div>
      ${weekDates.map(d=>{
        const isToday=d.getDate()===today.getDate()&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();
        const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        return`<div class="week-day-header${isToday?' wd-today':''}">
          <div class="wd-name">${dayNames[d.getDay()]}</div>
          <div class="wd-date">${d.getDate()}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="week-grid">`;
  hours.forEach(h=>{
    html+=`<div class="week-time-col">${h%12||12}${h<12?'am':'pm'}</div>`;
    weekDates.forEach(d=>{
      const dateStr=fmtDateISO(d);
      const slotEvs=getEventsForDateHour(dateStr,h);
      html+=`<div class="week-cell" ondblclick="openCalQuestionnaire('${dateStr}','${h}:00')">
        ${slotEvs.map(ev=>`<div class="cal-event-pill" onclick="event.stopPropagation();viewCalEvent('${ev.id}')">${esc(ev.title)}</div>`).join('')}
      </div>`;
    });
  });
  html+='</div></div></div>';
  container.innerHTML=html;
}

function drawDayView(container){
  const today = new Date();
  const hours=[];
  for(let h=6;h<=22;h++) hours.push(h);
  const dateStr=fmtDateISO(calDate);
  let html=`<div class="cal-wrap">${calToolbar()}<div class="day-view-wrap">`;
  hours.forEach(h=>{
    const slotEvs=getEventsForDateHour(dateStr,h);
    html+=`<div class="day-time">${h%12||12}${h<12?'am':'pm'}</div>
      <div class="day-slot" ondblclick="openCalQuestionnaire('${dateStr}','${h}:00')">
        ${slotEvs.map(ev=>`<div class="cal-event ev-blue" style="cursor:pointer;margin-bottom:2px" onclick="event.stopPropagation();viewCalEvent('${ev.id}')">${esc(ev.title)}</div>`).join('')}
      </div>`;
  });
  html+='</div></div>';
  container.innerHTML=html;
}

function fmtDateISO(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getEventsForDate(dateStr){
  return calEvents.filter(ev=>{
    if(!ev.startTime) return false;
    const d = ev.startTime.toDate?ev.startTime.toDate():new Date(ev.startTime);
    return fmtDateISO(d)===dateStr;
  });
}

function getEventsForDateHour(dateStr,hour){
  return calEvents.filter(ev=>{
    if(!ev.startTime) return false;
    const d = ev.startTime.toDate?ev.startTime.toDate():new Date(ev.startTime);
    return fmtDateISO(d)===dateStr && d.getHours()===hour;
  });
}

const Q_STEPS = [
  {id:'prospect',label:"Prospect / Client Name",type:'text',placeholder:'John Smith'},
  {id:'bizName',label:"Business Name",type:'text',placeholder:'ABC Roofing LLC'},
  {id:'phone',label:"Phone Number",type:'text',placeholder:'(555) 000-0000'},

  {id:'goal',label:"What is their main goal for the website?",type:'radio',options:['Get more leads/calls','Look more professional','Sell products online','Improve existing site','Not sure yet']},
  {id:'timeline',label:"What is their desired timeline?",type:'radio',options:['ASAP','Within 1 month','1–3 months','Just exploring']},
  {id:'decisionMaker',label:"Are you speaking with the decision maker?",type:'radio',options:['Yes','No — need to loop someone in','Will confirm']},

];

function openCalQuestionnaire(dateStr, timeStr=''){
  qData = {date:dateStr, time:timeStr};
  qCurrentStep = 0;
  renderQStep();
}

function renderQStep(){
  const step = Q_STEPS[qCurrentStep];
  const total = Q_STEPS.length;
  const isLast = qCurrentStep===total-1;
  const dots = Q_STEPS.map((_,i)=>`<div class="q-dot${i===qCurrentStep?' active':i<qCurrentStep?' done':''}"></div>`).join('');
  let inputHtml='';
  if(step.type==='text'||step.type==='email'){
    inputHtml=`<input class="q-input" type="${step.type}" id="qInput" placeholder="${esc(step.placeholder||'')}" value="${esc(qData[step.id]||'')}" onkeydown="if(event.key==='Enter')qNext()">`;
  }else if(step.type==='textarea'){
    inputHtml=`<textarea class="q-input q-textarea" id="qInput" placeholder="${esc(step.placeholder||'')}">${esc(qData[step.id]||'')}</textarea>`;
  }else if(step.type==='radio'){
    inputHtml=`<div class="q-radio-group">${step.options.map(o=>`
      <label class="q-radio-opt${qData[step.id]===o?' selected':''}" onclick="qSelectRadio(this,'${esc(o)}')">
        <input type="radio" name="qRadio" value="${esc(o)}"${qData[step.id]===o?' checked':''}>
        ${esc(o)}
      </label>`).join('')}</div>`;
  }
  const body=`
    <div class="q-step-indicator">${dots}</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:600">Step ${qCurrentStep+1} of ${total}</div>
    <div class="q-label">${esc(step.label)}</div>
    ${inputHtml}`;
  const footer=[
    qCurrentStep>0?{label:'← Back',cls:'btn-secondary',fn:'qBack()'}:null,
    {label:isLast?'✅ Save Consultation':'Next →',cls:'btn-primary',fn:'qNext()'},
    {label:'Cancel',cls:'btn-secondary',fn:'closeModal()'}
  ].filter(Boolean);
  openModal(`📋 Consultation Intake — ${qData.date||''}`,body,footer,'modal-lg');
  // Focus input
  setTimeout(()=>{const el=document.getElementById('qInput');if(el)el.focus()},100);
}

function qSelectRadio(el,val){
  document.querySelectorAll('.q-radio-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked=true;
  qData[Q_STEPS[qCurrentStep].id]=val;
}

function qNext(){
  const step = Q_STEPS[qCurrentStep];
  const input = document.getElementById('qInput');
  if(step.type==='radio'){
    if(!qData[step.id]){alert('Please select an option.');return}
  }else if(input){
    qData[step.id]=input.value.trim();
  }
  if(qCurrentStep===Q_STEPS.length-1){
    saveConsultation();
  }else{
    qCurrentStep++;
    renderQStep();
  }
}

function qBack(){
  if(qCurrentStep>0){qCurrentStep--;renderQStep()}
}

async function saveConsultation(){
  const title = `📞 ${qData.prospect||'Consultation'} — ${qData.bizName||''}`;
  const time = qData.time||'09:00';
  const startTime = new Date(`${qData.date}T${time}`);
  const noteLines = Q_STEPS.map(s=>`${s.label}: ${qData[s.id]||'—'}`).join('\n');
  const data={
    title, type:'call',
    startTime:firebase.firestore.Timestamp.fromDate(startTime),
    duration:60,
    clientName:qData.prospect||'',
    businessName:qData.bizName||'',
    phone:qData.phone||'',
    email:qData.email||'',
    industry:qData.industry||'',
    hasWebsite:qData.hasWebsite||'',
    goal:qData.goal||'',
    timeline:qData.timeline||'',
    decisionMaker:qData.decisionMaker||'',
    notes:qData.notes||'',
    colorClass:'ev-green',
    createdBy:currentUser.uid,
    createdByName:currentUserData.name,
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  try{
    await db.collection('calendar_events').add(data);
    closeModal();
    alert(`✅ Consultation saved for ${qData.prospect||'client'} on ${qData.date}!`);
  }catch(e){alert('Error saving: '+e.message)}
}

async function loadSavedAgreements(){
  const el = document.getElementById('savedAgreementsBody');
  if(!el) return;
  try{
    let q = db.collection('agreements').orderBy('createdAt','desc').limit(20);
    const isAdmin=['owner','admin'].includes(currentUserData.role);
    if(!isAdmin) q=db.collection('agreements').where('createdBy','==',currentUser.uid).orderBy('createdAt','desc').limit(20);
    const snap = await q.get();
    if(snap.empty){el.innerHTML='<div class="empty-state"><div class="es-icon">📄</div><p>No agreements yet.</p></div>';return}
    const rows = snap.docs.map(d=>{
      const a={id:d.id,...d.data()};
      return`<tr>
        <td style="font-weight:600">${esc(a.clientName||'—')}</td>
        <td>${esc(a.bizName||'—')}</td>
        <td><span class="badge badge-blue">${esc(a.plan||'—')}</span></td>
        <td>$${esc(a.rate||'—')}/mo</td>
        <td style="color:var(--text2);font-size:12px">${fmtDate(a.createdAt)}</td>
        <td>${esc(a.createdByName||'—')}</td>
        <td><button class="btn btn-secondary btn-sm" onclick="reopenAgreement('${a.id}')">Open</button></td>
      </tr>`;
    }).join('');
    el.innerHTML=`<table><thead><tr><th>Client</th><th>Business</th><th>Plan</th><th>Rate</th><th>Date</th><th>Rep</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){el.innerHTML=`<div style="color:var(--red);font-size:13px">Error: ${e.message}</div>`}
}

function openNewAgreement(){
  const box = document.getElementById('modalBox');
  box.classList.add('modal-xl');
  openModal('New Service Agreement', buildAgreementModalContent(), [
    {label:'Close',cls:'btn-secondary',fn:'closeAgreementModal()'},
    {label:'Save Agreement',cls:'btn-primary',fn:'saveAgreementFromModal()'}
  ]);
}

function closeAgreementModal(){
  document.getElementById('modalBox').classList.remove('modal-xl');
  closeModal();
}

  return `

        <div class="form-group"><label>Client Name</label><input type="text" id="ag_client" placeholder="John Smith" oninput="prefillAgreement()"></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="ag_biz" placeholder="ABC Roofing LLC" oninput="prefillAgreement()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Plan</label>
          <select id="ag_plan" onchange="prefillAgreement()">
            <option value="12-Month">12-Month — $299/mo</option>
            <option value="24-Month">24-Month — $199/mo</option>
            <option value="36-Month">36-Month — $149/mo</option>
            <option value="Month-to-Month">Month-to-Month — $349/mo</option>
          </select>

function prefillAgreement(){
  const frame = document.getElementById('agreementFrame');
  if(!frame) return;
  // Load the agreement page in the iframe, then fill fields
  if(!frame._loaded){
    const serviceAgreeURL = 'https://tyler-john-albrecht.github.io/Albrecht-Digital/Roofing-Service-Agreement/albrecht-service-agreement.html';
    frame.src = serviceAgreeURL;
    frame._loaded = true;
  }
}

async function saveAgreementFromModal(){
  const clientName = document.getElementById('ag_client').value.trim();
  const bizName = document.getElementById('ag_biz').value.trim();
  const plan = document.getElementById('ag_plan').value;
  if(!clientName){alert('Please enter client name.');return}
  try{
    await db.collection('agreements').add({
      clientName,bizName,plan,
      rate:PLAN_PRICES[plan]||0,
      createdBy:currentUser.uid,
      createdByName:currentUserData.name,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    closeAgreementModal();
    loadSavedAgreements();
    alert('Agreement saved to records!');
  }catch(e){alert('Error: '+e.message)}
}

function openAgreementDocs(){
  const box = document.getElementById('modalBox');
  box.classList.add('modal-xl');
  openModal('Service Agreement Template',`
    <iframe src="https://tyler-john-albrecht.github.io/Albrecht-Digital/Roofing-Service-Agreement/albrecht-service-agreement.html" style="width:100%;height:600px;border:none;background:#f0f2f5;border-radius:var(--r2)"></iframe>
  `,[
    {label:'Close',cls:'btn-secondary',fn:'closeAgreementModal()'}
  ]);
}

async function reopenAgreement(id){
  const snap = await db.collection('agreements').doc(id).get();
  const a = {id,...snap.data()};
  const box = document.getElementById('modalBox');
  box.classList.add('modal-xl');
  openModal(`Agreement — ${a.clientName||'Client'}`,buildAgreementModalContent(),[
    {label:'Close',cls:'btn-secondary',fn:'closeAgreementModal()'},
    {label:'Update',cls:'btn-primary',fn:`updateAgreement('${id}')`}
  ]);
  setTimeout(()=>{
    if(document.getElementById('ag_client')) document.getElementById('ag_client').value=a.clientName||'';
    if(document.getElementById('ag_biz')) document.getElementById('ag_biz').value=a.bizName||'';
    if(document.getElementById('ag_plan')) document.getElementById('ag_plan').value=a.plan||'12-Month';
    prefillAgreement();
  },100);
}

let teamManageTab = 'active'; // active | pending | archived

async function renderTeam(){
  if(!['owner','admin'].includes(currentUserData.role)){navigate('dashboard');return}
  const ca = document.getElementById('contentArea');
  ca.innerHTML=`
    <div class="tabs">
      <button class="tab-btn${teamManageTab==='active'?' active':''}" onclick="setTeamTab('active')">Active Members</button>
      <button class="tab-btn${teamManageTab==='pending'?' active':''}" onclick="setTeamTab('pending')">
        Pending <span id="pendingCountLabel"></span>
      </button>
      <button class="tab-btn${teamManageTab==='archived'?' active':''}" onclick="setTeamTab('archived')">Archived</button>
    </div>
    <div id="teamTabContent"></div>`;
  renderTeamTab();
}

function setTeamTab(tab){
  teamManageTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.toLowerCase().includes(tab));
  });
  renderTeamTab();
}

async function renderTeamTab(){
  const el = document.getElementById('teamTabContent');
  if(!el) return;
  el.innerHTML='<div style="color:var(--text2);font-size:13px">Loading…</div>';
  try{
    const snap = await db.collection('users').orderBy('createdAt','desc').get();
    const all = snap.docs.map(d=>({id:d.id,...d.data()}));
    const pending = all.filter(u=>u.status==='pending');
    // Update pending label
    const pendingLbl = document.getElementById('pendingCountLabel');
    if(pendingLbl && pending.length>0) pendingLbl.innerHTML=`<span class="nav-badge" style="display:inline-flex;margin-left:4px">${pending.length}</span>`;

    let users=[];
    if(teamManageTab==='active') users=all.filter(u=>u.status==='approved');
    else if(teamManageTab==='pending') users=pending;
    else if(teamManageTab==='archived') users=all.filter(u=>u.status==='archived'||u.status==='denied');

    if(users.length===0){
      el.innerHTML=`<div class="card"><div class="card-body"><div class="empty-state"><div class="es-icon">${teamManageTab==='pending'?'✅':teamManageTab==='archived'?'📦':'👥'}</div><p>${teamManageTab==='pending'?'No pending requests — all clear!':teamManageTab==='archived'?'No archived members.':'No active team members yet.'}</p></div></div></div>`;
      return;
    }

    const isOwner = currentUserData.role==='owner';
    el.innerHTML=`<div class="card"><div class="card-body" style="padding:0">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>${users.map(u=>{
          const color=u.avatarColor||avatarColor(u.name);
          const inits=initials(u.name);
          let actions='';
          if(teamManageTab==='pending'){
            actions=`<button class="btn btn-success btn-sm" onclick="updateUserStatus('${u.id}','approved')">✅ Approve</button>
              <button class="btn btn-danger btn-sm" onclick="updateUserStatus('${u.id}','denied')">✗ Deny</button>
              <button class="btn btn-secondary btn-sm" onclick="updateUserStatus('${u.id}','archived')">📦 Archive</button>`;
          }else if(teamManageTab==='active'){
            actions=`${isOwner&&u.id!==currentUser.uid?`<button class="btn btn-secondary btn-sm" onclick="toggleAdminRole('${u.id}','${u.role}')">${u.role==='admin'?'Remove Admin':'Make Admin'}</button>`:''}
              <button class="btn btn-danger btn-sm" onclick="updateUserStatus('${u.id}','denied')">Revoke</button>
              <button class="btn btn-secondary btn-sm" onclick="updateUserStatus('${u.id}','archived')">📦 Archive</button>`;
          }else if(teamManageTab==='archived'){
            actions=`<button class="btn btn-success btn-sm" onclick="updateUserStatus('${u.id}','approved')">Restore</button>`;
          }
          return`<tr>
            <td>
              <div style="display:flex;align-items:center;gap:9px">
                <div class="user-avatar" style="background:${color};width:30px;height:30px;font-size:11px">${inits}</div>
                <span style="font-weight:600">${esc(u.name)}</span>
              </div>
            </td>
            <td style="color:var(--text2)">${esc(u.email)}</td>
            <td><span class="badge ${u.role==='owner'?'badge-purple':u.role==='admin'?'badge-blue':'badge-gray'}">${esc(u.role)}</span></td>
            <td style="color:var(--text2);font-size:12px">${fmtDate(u.createdAt)}</td>
            <td><div style="display:flex;gap:6px;flex-wrap:wrap">${actions}</div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div></div>`;
  }catch(e){el.innerHTML=`<div style="color:var(--red)">Error: ${e.message}</div>`}
}

async function updateUserStatus(uid,status){
  const labels={approved:'approve',denied:'deny access for',archived:'archive'};
  if(!confirm(`Are you sure you want to ${labels[status]||status} this user?`)) return;
  try{
    await db.collection('users').doc(uid).update({status});
    renderTeamTab();
  }catch(e){alert('Error: '+e.message)}
}

async function toggleAdminRole(uid,currentRole){
  const newRole = currentRole==='admin'?'employee':'admin';
  if(!confirm(`Change this user to ${newRole}?`)) return;
  await db.collection('users').doc(uid).update({role:newRole});
  renderTeamTab();
}

async function renderOverview(){

  ca.innerHTML='<div style="color:var(--text2);font-size:13px">Loading overview…</div>';

    const [usersSnap,clientsSnap] = await Promise.all([
      db.collection('users').where('status','==','approved').get(),
      db.collection('clients').get()

    let html='';

      const uc=clients.filter(c=>c.employeeId===u.id);
      const active=uc.filter(c=>c.status==='Active').length;
      const mrr=uc.filter(c=>c.status==='Active').reduce((s,c)=>s+(c.monthlyRate||0),0);

      html+=`<div class="card">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="user-avatar" style="background:${color};width:36px;height:36px">${initials(u.name)}</div>
            <div>
              <div style="font-weight:700">${esc(u.name)}</div>
              <div style="font-size:11px;color:var(--text2)">${esc(u.role)} · ${uc.length} clients · ${active} active · $${mrr.toLocaleString()}/mo MRR</div>
            </div>
          </div>
        </div>
        ${uc.length>0?`<div class="card-body" style="padding:0">
          <table>
            <thead><tr><th>Client</th><th>Business</th><th>Plan</th><th>Status</th><th>MRR</th></tr></thead>
            <tbody>${uc.map(c=>`<tr>
              <td style="font-weight:600">${esc(c.name)}</td>
              <td style="color:var(--text2)">${esc(c.businessName||'—')}</td>
              <td><span class="badge badge-blue">${esc(c.plan||'—')}</span></td>
              <td><span class="badge ${c.status==='Active'?'badge-green':'badge-gray'}">${c.status}</span></td>
              <td style="font-size:12px">$${(c.monthlyRate||0).toLocaleString()}/mo</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>`:`<div class="card-body"><div class="empty-state" style="padding:16px"><p>No clients yet</p></div></div>`}
      </div>`;
    });
    ca.innerHTML=html||'<div class="card"><div class="card-body"><div class="empty-state"><p>No team members yet.</p></div></div></div>';
  }catch(e){ca.innerHTML=`<div style="color:var(--red)">Error: ${e.message}</div>`}
}

// ═══════════════════════════════════════════════
function openModal(title, body, buttons=[], sizeClass=''){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  const footer = document.getElementById('modalFooter');
  footer.innerHTML = buttons.map(b=>`<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`).join('');
  const box = document.getElementById('modalBox');
  box.className='modal'+(sizeClass?' '+sizeClass:'');
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalBox').className='modal';
}

// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
